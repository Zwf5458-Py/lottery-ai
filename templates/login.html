<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 登录 · 澳门六合彩数据分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1333 50%, #24243e 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #e5e7eb;
            overflow: hidden;
        }

        /* 动态背景粒子 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(120, 80, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 100, 100, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 60% 80%, rgba(100, 200, 255, 0.05) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.6;
            }

            100% {
                opacity: 1;
            }
        }

        .login-card {
            position: relative;
            z-index: 1;
            width: 420px;
            background: rgba(30, 30, 60, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(120, 80, 255, 0.2);
            border-radius: 20px;
            padding: 48px 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(120, 80, 255, 0.1);
            animation: cardFloat 0.6s ease-out;
        }

        @keyframes cardFloat {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card .subtitle {
            text-align: center;
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a78bfa;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(120, 80, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 20px rgba(120, 80, 255, 0.15);
            background: rgba(255, 255, 255, 0.09);
        }

        .form-group input::placeholder {
            color: #6b7280;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .switch-link {
            text-align: center;
            margin-top: 24px;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .switch-link a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .switch-link a:hover {
            color: #c4b5fd;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #fca5a5;
            font-size: 0.9rem;
            text-align: center;
            animation: shake 0.3s ease-in-out;
            display: none;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .logo-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 16px;
        }
    </style>

    <!-- CSRF Token Global Setup -->
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <script>
        const originalFetch = window.fetch;
        window.fetch = async function(resource, config) {
            config = config || {};
            const method = (config.method || 'GET').toUpperCase();
            if (['POST', 'PUT', 'DELETE', 'PATCH'].includes(method)) {
                config.headers = {
                    ...config.headers,
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.content
                };
            }
            return originalFetch(resource, config);
        };
    </script>
</head>

<body>
    <div class="login-card">
        <div class="logo-icon">🎰</div>
        <h1>系统登录</h1>
        <p class="subtitle">澳门六合彩 · 数据分析与模拟开奖系统</p>

        <div class="error-msg" id="error-msg"></div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>👤 用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>🔒 密码</label>
                <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">🚀 登录</button>
        </form>

        <div class="switch-link">
            还没有账号？<a href="/register">立即注册</a>
        </div>
    </div>

    <script>
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.animation = 'none';
            setTimeout(() => el.style.animation = 'shake 0.3s ease-in-out', 10);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 验证中...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (err) {
                showError('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 登录';
            }
        }
    </script>
</body>

</html>
