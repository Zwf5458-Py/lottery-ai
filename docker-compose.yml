name: macau-mark-six

services:
  web:
    build: .
    container_name: macau-mark-six
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
    environment:
      - FLASK_ENV=production
      - HOST_GATEWAY_URL=http://host.docker.internal:8317/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
